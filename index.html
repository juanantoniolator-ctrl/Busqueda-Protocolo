<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="FARO">
<meta name="theme-color" content="#1a6bbf">
<title>FARO — Protocolo SIFEBU</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
:root{
  --azul:#1a6bbf; --azul2:#2980d4; --azul-cl:#e8f2ff; --azul-xcl:#f0f6ff;
  --borde:#ccddf5; --borde2:#b0ccea;
  --txt1:#1a2f4a; --txt2:#2d4a6a; --txt3:#5a7a9a; --txt4:#8aaac5;
  --rojo:#c0392b; --rojo-bg:#fdf0ef; --rojo2:#e74c3c;
  --naranja:#b45309; --naranja-bg:#fef8ec;
  --verde:#15803d; --verde-bg:#f0faf4;
  --r:12px; --r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--azul-xcl);color:var(--txt1);display:flex;flex-direction:column;height:100dvh;}

.vista{display:none;flex-direction:column;height:100dvh;}
.vista.activa{display:flex;}

/* HEADER PRINCIPAL */
.hdr{flex-shrink:0;padding:14px 16px 12px;background:linear-gradient(135deg,var(--azul) 0%,var(--azul2) 100%);border-bottom:1px solid #1560a8;display:flex;align-items:center;justify-content:space-between;padding-top:max(14px,env(safe-area-inset-top));}
.hdr-izq{display:flex;align-items:center;gap:10px;}
.hdr-logo{width:44px;height:44px;border-radius:10px;flex-shrink:0;object-fit:cover;}
.hdr-eye{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.75);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;}
.hdr-nombre{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;line-height:1;}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.75);margin-top:2px;}
.hdr-badge{font-family:'DM Mono',monospace;font-size:10px;padding:5px 9px;border-radius:6px;border:1px solid rgba(255,255,255,.4);color:#fff;background:rgba(255,255,255,.15);text-align:center;line-height:1.4;}

/* HEADER EXPORTAR */
.hdr-exp{flex-shrink:0;padding:14px 16px;background:linear-gradient(135deg,var(--azul) 0%,var(--azul2) 100%);display:flex;align-items:center;gap:12px;padding-top:max(14px,env(safe-area-inset-top));}
.btn-volver{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);border-radius:8px;color:#fff;font-size:14px;padding:7px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;}
.hdr-exp-titulo{font-family:'DM Serif Display',serif;font-size:18px;color:#fff;flex:1;}

/* TABS */
.tabs-wrap{flex-shrink:0;background:#f7faff;border-bottom:1px solid var(--borde);overflow-x:auto;scrollbar-width:none;display:flex;}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;padding:11px 14px;font-size:11px;font-weight:500;color:var(--txt4);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;}
.tab.on{color:var(--azul);border-bottom-color:var(--azul);}

/* PROGRESO */
.prog-wrap{flex-shrink:0;padding:10px 16px 8px;background:#fff;border-bottom:1px solid var(--borde);}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.prog-lbl{font-size:11px;color:var(--txt3);}
.prog-cnt{font-family:'DM Mono',monospace;font-size:12px;color:var(--azul);}
.prog-track{height:3px;background:var(--azul-xcl);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--azul);border-radius:2px;transition:width .35s ease;width:0%;}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;padding:10px 12px 8px;-webkit-overflow-scrolling:touch;}

/* SECCIONES */
.sec{margin-bottom:6px;}
.sec-hdr{display:flex;align-items:center;gap:10px;padding:11px 12px;background:#fff;border:1px solid var(--borde);border-radius:var(--r);cursor:pointer;user-select:none;}
.sec-hdr.open{border-radius:var(--r) var(--r) 0 0;border-bottom-color:transparent;}
.sec-ico{font-size:16px;flex-shrink:0;}
.sec-info{flex:1;min-width:0;}
.sec-name{font-size:12px;font-weight:600;color:var(--txt1);}
.sec-sub{font-size:10px;color:var(--txt4);margin-top:1px;}
.badge{font-family:'DM Mono',monospace;font-size:8px;font-weight:500;padding:2px 7px;border-radius:20px;letter-spacing:.05em;flex-shrink:0;}
.b-red{background:var(--rojo-bg);color:var(--rojo);border:1px solid var(--rojo2);}
.b-orange{background:var(--naranja-bg);color:var(--naranja);border:1px solid #7c2d12;}
.b-blue{background:var(--azul-cl);color:var(--azul);border:1px solid #1e3a5f;}
.chev{font-size:12px;color:var(--txt4);transition:transform .2s;flex-shrink:0;}
.chev.open{transform:rotate(180deg);}
.items-wrap{display:none;background:#fff;border:1px solid var(--borde);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden;}
.items-wrap.open{display:block;}
.item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-bottom:1px solid var(--borde);cursor:pointer;}
.item:last-child{border-bottom:none;}
.item.done{background:rgba(21,128,61,.04);}
.inum{font-family:'DM Mono',monospace;font-size:10px;color:var(--txt4);min-width:16px;padding-top:1px;flex-shrink:0;}
.ibox{width:18px;height:18px;flex-shrink:0;border:1px solid var(--borde2);border-radius:4px;margin-top:1px;display:flex;align-items:center;justify-content:center;background:#fff;transition:all .12s;}
.ibox.on{background:var(--verde-bg);border-color:var(--verde);}
.ibox.on::after{content:'';display:block;width:4px;height:8px;border-right:1.5px solid var(--verde);border-bottom:1.5px solid var(--verde);transform:rotate(45deg) translate(-1px,-1px);}
.itxt{flex:1;font-size:13px;color:var(--txt2);line-height:1.45;}
.itxt.done{color:var(--txt4);text-decoration:line-through;text-decoration-color:var(--borde2);}
.utag{display:inline-block;margin-left:5px;font-family:'DM Mono',monospace;font-size:8px;padding:1px 5px;border-radius:3px;vertical-align:middle;background:var(--rojo-bg);color:var(--rojo);border:1px solid var(--rojo2);letter-spacing:.04em;}

/* BOTTOM */
.bottom{flex-shrink:0;display:flex;gap:8px;padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:#fff;border-top:1px solid var(--borde);}
.btn{flex:1;padding:11px 8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;border-radius:var(--r2);cursor:pointer;border:1px solid var(--borde2);background:var(--azul-xcl);color:var(--txt2);display:flex;align-items:center;justify-content:center;gap:5px;}
.btn:active{opacity:.7;}
.btn-azul{background:var(--azul-cl);border-color:var(--azul2);color:var(--azul);}
.btn-rojo{background:var(--rojo-bg);border-color:var(--rojo2);color:var(--rojo);}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.65);align-items:flex-end;justify-content:center;padding:16px;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border:1px solid var(--borde2);border-radius:var(--r);padding:20px 16px 16px;width:100%;max-width:380px;}
.modal-titulo{font-size:15px;font-weight:600;color:var(--txt1);margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--txt3);margin-bottom:16px;line-height:1.5;}
.modal-btns{display:flex;gap:8px;}
.m-cancel{flex:1;padding:11px;border-radius:var(--r2);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--borde2);background:var(--azul-xcl);color:var(--txt3);font-family:'DM Sans',sans-serif;}
.m-ok{flex:1;padding:11px;border-radius:var(--r2);font-size:13px;font-weight:500;cursor:pointer;border:none;background:var(--rojo);color:#fff;font-family:'DM Sans',sans-serif;}

/* MENÚ EXPORTAR */
.exp-bg{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.65);align-items:flex-end;justify-content:center;padding:16px;}
.exp-bg.show{display:flex;}
.exp-panel{background:#fff;border:1px solid var(--borde2);border-radius:var(--r);width:100%;max-width:380px;overflow:hidden;}
.exp-titulo{padding:14px 16px;font-size:11px;font-weight:600;color:var(--txt3);border-bottom:1px solid var(--borde);font-family:'DM Mono',monospace;letter-spacing:.05em;text-transform:uppercase;}
.exp-opt{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--borde);}
.exp-opt:active{background:var(--azul-xcl);}
.exp-ico{font-size:22px;flex-shrink:0;}
.exp-nombre{font-size:14px;font-weight:500;color:var(--txt1);}
.exp-desc{font-size:11px;color:var(--txt3);margin-top:2px;}
.exp-cancel{width:100%;padding:14px;text-align:center;font-size:13px;font-weight:500;color:var(--txt3);background:var(--azul-xcl);border:none;border-top:1px solid var(--borde);cursor:pointer;font-family:'DM Sans',sans-serif;}

/* VISTA DOCUMENTO */
.doc-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#f0f4f8;padding:16px;}
.doc-body{background:#fff;max-width:700px;margin:0 auto;padding:28px 24px;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.08);font-family:Arial,sans-serif;}
.doc-body h1{font-size:17pt;color:#0c2340;margin-bottom:3px;}
.doc-body .doc-sub{font-size:9pt;color:#5a7a9a;margin-bottom:10px;}
.doc-body .doc-meta{background:#f0f6ff;padding:7px 11px;border-radius:4px;margin-bottom:14px;font-size:9pt;}
.doc-body h2{font-size:11pt;color:#185fa5;border-left:4px solid #185fa5;padding-left:8px;margin:14px 0 5px;}
.doc-body p{font-size:10pt;margin:3px 0 3px 10px;line-height:1.5;color:#2d4a6a;}
.doc-body p.tachado{text-decoration:line-through;color:#999;}
.doc-body .doc-pie{margin-top:18px;font-size:8pt;color:#aaa;border-top:1px solid #eee;padding-top:8px;}
.doc-acciones{flex-shrink:0;display:flex;gap:8px;padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:#fff;border-top:1px solid var(--borde);}

@media print{
  .hdr-exp,.doc-acciones{display:none!important;}
  .doc-scroll{padding:0;}
  .doc-body{box-shadow:none;border-radius:0;padding:16px;}
  body{background:#fff;}
}
</style>
</head>

const NOMBRES={urgentes:"Medidas Urgentes",escena:"Escena del Hecho",investigacion:"Investigación",digital:"Digital y Tecnología",judicial:"Medidas Judiciales",auditoria:"Auditoría Final"};
let tab="urgentes",ck={},expanded=false;
function k(t,s,i){return t+"|"+s+"|"+i;}

function gTab(t,btn){
  tab=t;expanded=false;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  document.getElementById("expbtn").textContent="↕ Expandir";
  render();prog();
}

function render(){
  const body=document.getElementById("cuerpo");
  body.innerHTML="";
  D[tab].s.forEach((sec,si)=>{
    const sid=tab+"_"+si;
    const first=si===0;
    const wrap=document.createElement("div");
    wrap.className="sec";
    const hdr=document.createElement("div");
    hdr.className="sec-hdr"+(first?" open":"");
    hdr.id="h_"+sid;
    hdr.onclick=()=>toggleSec(sid);
    hdr.innerHTML="<span class='sec-ico'>"+sec.ic+"</span><div class='sec-info'><div class='sec-name'>"+sec.n+"</div><div class='sec-sub'>"+sec.it.length+" medidas</div></div><span class='badge "+sec.bc+"'>"+sec.b+"</span><span class='chev"+(first?" open":"")+"' id='c_"+sid+"'>▾</span>";
    const iw=document.createElement("div");
    iw.className="items-wrap"+(first?" open":"");
    iw.id="iw_"+sid;
    sec.it.forEach((item,ii)=>{
      const key=k(tab,si,ii);
      const done=!!ck[key];
      const row=document.createElement("div");
      row.className="item"+(done?" done":"");
      row.id="r_"+key;
      row.onclick=()=>toggle(tab,si,ii);
      row.innerHTML="<span class='inum'>"+(ii+1)+"</span><div class='ibox"+(done?" on":"")+"' id='b_"+key+"'></div><span class='itxt"+(done?" done":"")+"' id='t_"+key+"'>"+item.t+(item.u?"<span class='utag'>URGENTE</span>":"")+"</span>";
      iw.appendChild(row);
    });
    wrap.appendChild(hdr);
    wrap.appendChild(iw);
    body.appendChild(wrap);
  });
}

function toggleSec(sid){
  const iw=document.getElementById("iw_"+sid);
  const hdr=document.getElementById("h_"+sid);
  const chev=document.getElementById("c_"+sid);
  const open=iw.classList.contains("open");
  iw.classList.toggle("open",!open);
  hdr.classList.toggle("open",!open);
  chev.classList.toggle("open",!open);
}

function toggle(t,s,i){
  const key=k(t,s,i);
  ck[key]=!ck[key];
  const box=document.getElementById("b_"+key);
  const txt=document.getElementById("t_"+key);
  const row=document.getElementById("r_"+key);
  if(box)box.classList.toggle("on",!!ck[key]);
  if(txt)txt.classList.toggle("done",!!ck[key]);
  if(row)row.classList.toggle("done",!!ck[key]);
  prog();
}

function prog(){
  const secs=D[tab].s;
  let tot=0,done=0;
  secs.forEach((s,si)=>s.it.forEach((_,ii)=>{tot++;if(ck[k(tab,si,ii)])done++;}));
  document.getElementById("pcnt").textContent=done+" / "+tot;
  const pct=tot>0?Math.round((done/tot)*100):0;
  document.getElementById("pfill").style.width=pct+"%";
  document.getElementById("plbl").textContent=pct===100?"✓ Protocolo completo":"Medidas completadas";
}

function toggleAll(){
  expanded=!expanded;
  document.querySelectorAll(".items-wrap").forEach(el=>el.classList.toggle("open",expanded));
  document.querySelectorAll(".sec-hdr").forEach(el=>el.classList.toggle("open",expanded));
  document.querySelectorAll(".chev").forEach(el=>el.classList.toggle("open",expanded));
  document.getElementById("expbtn").textContent=expanded?"↕ Colapsar":"↕ Expandir";
}

function askReset(){document.getElementById("modal").classList.add("show");}
function closeModal(){document.getElementById("modal").classList.remove("show");}
function doReset(){closeModal();D[tab].s.forEach((s,si)=>s.it.forEach((_,ii)=>{ck[k(tab,si,ii)]=false;}));render();prog();}

function showExpMenu(){document.getElementById("exp-menu").classList.add("show");}
function closeExpMenu(){document.getElementById("exp-menu").classList.remove("show");}

function volverMain(){
  document.getElementById("v-doc").classList.remove("activa");
  document.getElementById("v-main").classList.add("activa");
}

function abrirDoc(){
  closeExpMenu();
  const secs=D[tab].s;
  const nombre=NOMBRES[tab];
  const fecha=new Date().toLocaleDateString("es-AR");
  let filas="";
  secs.forEach((sec,si)=>{
    const bc={"URGENTE":"#a32d2d","IRREPRODUCIBLE":"#a32d2d","PRIORITARIO":"#7a4500","GESTIONAR":"#185fa5"}[sec.b]||"#185fa5";
    filas+="<h2>"+sec.ic+" "+sec.n+" <span style='font-size:8pt;color:"+bc+";'>["+sec.b+"]</span></h2>";
    sec.it.forEach((item,ii)=>{
      const done=!!ck[k(tab,si,ii)];
      const check=done?"&#9745;":"&#9744;";
      const cls=done?" tachado":"";
      const urg=item.u?" <span style='font-size:8pt;color:#a32d2d;font-weight:bold;'>[URGENTE]</span>":"";
      filas+="<p class='"+cls+"'>"+check+" "+(ii+1)+". "+item.t+urg+"</p>";
    });
  });
  document.getElementById("doc-contenido").innerHTML=
    "<h1>FARO — "+nombre+"</h1>"+
    "<div class='doc-sub'>Guía de Orientación en Búsqueda de Personas — Protocolo SIFEBU</div>"+
    "<div class='doc-meta'><b>Módulo:</b> "+nombre+" &nbsp;|&nbsp; <b>Fecha:</b> "+fecha+"</div>"+
    filas+
    "<div class='doc-pie'>FARO v1.0 — Protocolo SIFEBU — Uso exclusivo del Equipo Fiscal</div>";
  document.getElementById("v-main").classList.remove("activa");
  document.getElementById("v-doc").classList.add("activa");
}

render();prog();
</script>
